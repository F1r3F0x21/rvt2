[android]
plugindir:
description: This plugin extracts and analyzes forensic artifacts from Android devices.

[android.databases]
description: Parse common Android databases
help_section: android
modules:
  base.directory.DirectoryFilter
  FileParser.android.databases
path: ${sourcedir}/mnt

[android.whatsapp.csv]
description: Parse a WhatsApp database filtering by `message_group` or dates. Outputs to a single CSV. If message_group is set to an empty string, get all messages.
help_section: android
modules:
  base.output.CSVSink outfile='{outfile}' file_exists=OVERWRITE
  android.whatsapp.WhatsAppAndroid path='{path}' media_outdir='${outputdir}/whatsapp/{{message_group}}' message_group='{message_group}' start_date='{start_date}' end_date='{end_date}' myname='{myname}'
message_group: 34678678678@s.whatsapp.net
path: ${sourcedir}/mnt/p01/data/data/com.whatsapp/databases
start_date:
end_date:
myname: Terminal
default_params: {
  'path':'${path}',
  'outfile':'${outputdir}/whatsapp/whatsapp.csv',
  'message_group':'${message_group}',
  'start_date': '${start_date}',
  'end_date': '${end_date}',
  'myname': '${myname}'}
params_help: {
  'path': 'The path to the directory to parse. It must include `msgstore.db` and `wa.db`. Hint: `/data/data/com.whatsapp/databases`',
  'outfile': 'Save the result to this csv file. IMPORTANT: Be careful to redirect this path to the group folder when using `message_group`',
  'message_group': 'Chat identifier. If set to an empty string, outputs all messages. Run `android.whatsapp.list` to get a list of chat identifiers',
  'start_date': 'If set, output only messages from this date. Example format: `2018-12-25`',
  'end_date': 'If set, output only messages until this date. Example format: `2020-01-15`',
  'myname': 'The name to use for "myself"'}

[android.whatsapp.html]
description: Converts a single WhatsApp conversation in the WhatsApp database into HTML file.
  Runs `android.whatsapp.csv` and then `android.whatsapp.html.aux`.
  Warning: you MUST specify the chat using message_group
help_section: android
jobs:
    android.whatsapp.csv outfile='${outputdir}/whatsapp/{message_group}/whatsapp.csv' message_group='{message_group}' end_date='{end_date}' start_date='{start_date}' myname='{myname}'
    android.whatsapp.html.aux template='{template}' path='${outputdir}/whatsapp/{message_group}/whatsapp.csv'
template: chat2html_android.mako
default_params: {
  'template':'${template}',
  'message_group':'${android.whatsapp.csv:message_group}',
  'start_date': '${android.whatsapp.csv:start_date}',
  'end_date': '${android.whatsapp.csv:end_date}',
  'myname': '${android.whatsapp.csv:myname}'}
params_help: {
  'message_group': 'Chat identifier. It is mandatory! Run `android.whatsapp.list` to get a list of chat identifiers',
  'start_date': 'If set, output only messages from this date. Example format: `2018-12-25`',
  'end_date': 'If set, output only messages until this date. Example format: `2020-01-15`',
  'myname': 'The name to use for "myself"',
  'template': 'Mako template file with html configuration. Relative to current working directory or `${android:plugindir}`'}

[android.whatsapp.html.aux]
description: Converts a CSV WhatsApp file created with `android.whatsapp.csv` into HTML. This is an auxiliary job for `android.whatsapp.html`
help_section: android
modules:
    base.templates.TemplateSink outfile='${outputdir}/whatsapp/{message_group}/chat.html' template_file='{template}' template_dirs=". ${android:plugindir}" file_exists=OVERWRITE
    base.input.CSVReader path="${path}"
template: ${android.whatsapp.html:template}
message_group: 34678678678@s.whatsapp.net
default_params: {
  'message_group': '${message_group}',
  'template': '${template}',
  }
params_help: {
    'message_group': 'Group the conversation belongs to. These are the names of folders inside ${outputdir}/whatsapp',
    'template': 'Mako template file with html configuration. Relative to current working directory or `${android:plugindir}`'}
path: '${outputdir}/whatsapp/${message_group}/whatsapp.csv'

[android.whatsapp.list]
description: List all available chats in a WhatsApp database
help_section: android
modules:
  print
  android.whatsapp.ListChatSessions path="${path}"
default_params: {
  'path': '${path}'
  }
params_help: {
  'path': 'The path to the directory to parse. It must include `msgstore.db`. Hint: `/data/data/com.whatsapp/databases`'}
path: ${android.whatsapp.csv:path}

[android.whatsapp.html.all]
description: Convert all chats in a WhatsApp database into HTML file, using `android.whatsapp.html`
help_section: android
modules:
  android.whatsapp.AllChatsToHtml path="${path}"
template: ${android.whatsapp.html:template}
default_params: {
  'template': '${template}',
  'path': '${path}'
  }
params_help: {
  'path': 'The path to the directory to parse. It must include `msgstore.db` and `wa.db`. Hint: `/data/data/com.whatsapp/databases`',
  'template': 'Mako template file with html configuration. Relative to current working directory or ``${android:plugindir}``'}
path: ${android.whatsapp.csv:path}

[android.whatsapp.csv.all]
description: Convert all chats in a WhatsApp database into as many directories as chats using `android.whatsapp.csv`
help_section: android
modules:
  android.whatsapp.AllChatsToCsv path="${path}"
default_params: {
  'path': '${path}'
  }
params_help: {
  'path': 'The path to the directory to parse. It must include `msgstore.db` and `wa.db`. Hint: `/data/data/com.whatsapp/databases`'}
path: ${android.whatsapp.csv:path}
