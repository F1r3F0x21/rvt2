[linux]
plugindir:
description: This plugin extracts and analyzes forensic artifacts from a Linux system.

[linuxforensics]
inherits: plugins.common
description: Jobs to be run on a disk image at the beginning with linux distribution
help_section: linux
jobs:
    plugins.common.RVT_mount.Mount
    plugins.common.RVT_files.Files
    plugins.common.RVT_history.History
    plugins.common.RVT_timelines.Timelines
    plugins.linux.RVT_linux.Characterize
    plugins.common.RVT_string.StringGenerate

;;;;;;;;;;;;;;;;;;;;;;; CRON
[linux.cron]
inherits: plugins.linux
description: Get the scheduled tasks or jobs using Cron
help_section: linux
jobs:
    linux.cron.crontab
    linux.cron.anacrontab
    linux.cron.system
    linux.cron.user-specific
    linux.cron.cronlog

[linux.cron.crontab]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the crontab file.
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.Cron outdir={crondir} mountdir={mountdir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/cron.csv',
  'crondir': '${plugins.linux:crondir}/',
  'mountdir': '${mountdir}'}
path: ${mountdir}/p*/etc/crontab

[linux.cron.anacrontab]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the crontab file.
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.AnacronTab outdir={crondir} mountdir={mountdir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/anacron.csv',
  'crondir': '${plugins.linux:crondir}/',
  'mountdir': '${mountdir}'}
path: ${mountdir}/p*/etc/anacrontab

[linux.cron.system]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the cron.daily, cron.weekly, cron.hourly, cron.monthly, cron.d folder.
help_section: linux 
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.Cron outdir={crondir} mountdir={mountdir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/cron.csv',
  'crondir': '${plugins.linux:crondir}/',
  'mountdir': '${mountdir}'
  }
path: ${mountdir}/p*/etc/cron.*/**

[linux.cron.user-specific]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the cron.daily, cron.weekly, cron.hourly, cron.monthly, cron.d folder.
help_section: linux 
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.Cron outdir={crondir} mountdir={mountdir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/cron.csv',
  'crondir': '${plugins.linux:crondir}/',
  'mountdir': '${mountdir}'
  }
path: ${mountdir}/p*/var/**/*cron/**

[linux.cron.cronlog]
inherits: plugins.linux
description: Get the cronlog
help_section: linux
jobs:
  linux.cron.cronlog.Compressed
  linux.cron.cronlog.NotCompressed
  linux.cron.cronlog.Csv_to_sorted_csv
  base.directory.DirectoryClear target={target}
target: ${plugins.linux:logsdir}/cron.logtmp.csv
default_params: {'target':'${target}'}

[linux.cron.cronlog.Compressed]
inherits: plugins.linux
description: Parse Cron logs compressed files
help_section: linux
cascade:
  base.input.AllLinesInCompressedFile
  plugins.linux.RVT_cron.CronLog
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:logsdir}/cron.logtmp.csv'}
path: ${mountdir}/p*/var/log/cron.log.*.gz

[linux.cron.cronlog.NotCompressed]
inherits: plugins.linux
description: Parse Cron logs not compressed files
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.CronLog
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:logsdir}/cron.logtmp.csv'}
path: ${mountdir}/p*/var/log/cron.log*

[linux.cron.cronlog.Csv_to_sorted_csv]
modules:
  base.output.CSVSink outfile='{outfile}' file_exists="OVERWRITE"
  base.mutations.SortResults fields="@timestamp"
  base.input.CSVReader progress.disable=True
default_params: {
  'outfile': '${plugins.linux:logsdir}/cron.log.csv'}
path: ${plugins.linux:logsdir}/cron.logtmp.csv

;;;;;;;;;;;;;;;;;;;;;;; SSH
[linux.ssh]
inherits: plugins.linux
description: Get the ssh information
help_section: linux
modules:
  base.directory.DirectoryFilter progress.disable='True'
  ssh.FileParser
path: ${DEFAULT:mountdir}
 
[ssh.FileParser]
inherits = base.directory.FileParser
parsers = (.*/.ssh/authorized_keys) linux.ssh.authorized_keys
  (.*/.ssh/known_hosts) linux.ssh.known_hosts
  (.*/\.?ssh/.*onfig) linux.ssh.config

[linux.ssh.authorized_keys]
inherits: plugins.linux
description: Get the ssh information from authorized_keys
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_ssh.Ssh_authorized_keys mountdir={mountdir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
default_params: {
  'outfile': '${plugins.linux:sshdir}/authorized_keys.csv',
  'mountdir' :  '${mountdir}'
  }

[linux.ssh.known_hosts]
inherits: plugins.linux
description: Get the ssh information from known_hosts
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_ssh.Ssh_known_hosts mountdir={mountdir}
  base.output.CSVSink outfile={outfile} mountdir={mountdir}
default_params: {
  'outfile': '${plugins.linux:sshdir}/known_hosts.csv',
  'mountdir' :  '${mountdir}'
  }

[linux.ssh.config]
inherits: plugins.linux
description: Get the ssh information from known_hosts
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_ssh.Ssh_config mountdir={mountdir}
  base.output.JSONSink outfile={outfile} file_exists="APPEND"
default_params: {
  'outfile': '${plugins.linux:sshdir}/config.json',
  'mountdir' :  '${mountdir}'
  }

;;;;;;;;;;;;;;;;;;;;;;; OTHERS
[linux.cron.cronlog2]
inherits: plugins.linux
description: Get the cronlog
help_section: linux
modules:
  base.mutations.ForEach run_job=linux.cron.cronlog_aux
  base.mutations.SplitField field="filename" new_fields='["file_no_extension","extension"]' new_fields_index='[0,1]' separator="."
  ;base.mutations.SetFields fields='{{{{"termination":"{{filename}}"}}}}'
  base.mutations.CommonFields
  base.directory.GlobFilter ftype='file'
  base.utils.MirrorOptions include_section=True relative_path=False
default_params: {
  'outdir': '${outputdir}',
  'path': ''}
path: ${mountdir}/p*/var/log/cron*
 
[linux.cron.cronlog_aux]
inherits: plugins.common
modules:
  base.output.DummySink outfile={outdir}/{file_no_extension}.log.txt file_exists="APPEND"
  plugins.linux.RVT_cron.CronLog
  base.input.AllLinesInFile progress.disable=True progress.disable=True
default_params: {
  'outdir': '${plugins.linux:logsdir}',
  'path': ''}
path:

[linux.cron.cronlogDescompress]
inherits: plugins.linux
description: Get the cronlog
help_section: linux
cascade:
  base.mutations.Descompress path="{zip_path}" unzip_destination="{unzip_folder}"
  base.directory.GlobFilter ftype='file'
default_params: {
  'zip_path': '${path}',
  'unzip_folder': '${plugins.linux:auxdir}/unzip_folder/'}
path: ${mountdir}/p*/var/log/cron*.gz

;;;;;;;;;;;;;;;;;;;;;;; CHARACTERIZE
[linux.characterize]
inherits: plugins.linux
description: Describes basic information about linux partitions and users.
  Information includes:
    - OS name, version, ID and owner
    - OS Installation (or update) date
    - Creation and last login/logoff dates for every user present
help_section: linux
modules:
  base.templates.TemplateSink template_file='{template_file}' outfile='{outfile}' file_exists='{file_exists}'
  plugins.linux.RVT_os_info.CharacterizeLinux aux_file='{aux_file}'
hivesdir: ${plugins.linux:hivesdir}
template_file: templates/os_summary.mako
outfile: ${analysisdir}/os_summary.md
default_params: {'outfile':'${outfile}',
  'aux_file': '${plugins.linux:auxdir}/os_info.json',
  'template_file':'${template_file}',
  'file_exists':'OVERWRITE'}
params_help: {
  'outfile':'path to file were results are stored (in markdown format)',
  'aux_file': 'json file where OS info will be stored and used by other jobs',
  'template_file':'mako template to display results'}

;;;;;;;;;;;;;;;;;;;;;;; EXAMPLESS
[linux.login.tmp]
inherits: plugins.linux
description: Get btmp, utmp and wtmp login record files.
help_section: linux
jobs:
  linux.login.wtmp_cast path="{path}"
  linux.login.wtmp_save path="{outfile_temp}"
  ;base.directory.GlobClear target="{outfile_temp}" ftype="file"
default_params: {
  'path': '${path}',
  'outfile_temp': '${plugins.linux:loginsdir}/wtmp.tmp'}
path: ${mountdir}/p04/var/log/*tmp

 
[linux.login.wtmp_cast]
inherits: plugins.linux
description: Hola
cascade:
  base.commands.Command cmd="last -f {path}" stdout={outfile}
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:loginsdir}/wtmp.tmp',
  'path': ''}
path: ${mountdir}/p04/var/log/wtmp

 
[linux.login.wtmp_save]
inherits: plugins.linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  base.commands.RegexFilter keyword_list='{keywords}'
  ;base.output.DummySink outfile={outfile} file_exists="OVERWRITE"
default_params: {
  'outfile': '${plugins.linux:loginsdir}/wtmp.csv',
  'keywords': 'down',
  'path': ''}
path: ${plugins.linux:loginsdir}/wtmp.tmp

[linux.sample_parser]
inherits: plugins.linux
description: TODO
help_section: linux
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_sample.ParseSomething
  base.output.CSVSink outfile={outfile}
  base.directory.GlobFilter ftype='file'
default_params: {
  'myregex': 'whatever',
  'outfile': '${plugins.linux:loginsdir}/sample.csv'}
path: ${mountdir}/p*/var/log/something