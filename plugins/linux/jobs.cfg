[linux]
plugindir:
description: This plugin extracts and analyzes forensic artifacts from a Linux system.
help_section: linux
jobs:
    linux.characterize
    linux.cron
    linux.ssh
    linux.login
    linux.bash

[linuxforensics]
inherits: plugins.common
description: Jobs to be run on a disk image at the beginning with linux distribution
help_section: linux
jobs:
    plugins.common.RVT_mount.Mount
    plugins.common.RVT_files.Files
    plugins.common.RVT_history.History
    plugins.common.RVT_timelines.Timelines
    plugins.linux.RVT_linux.Characterize
    plugins.common.RVT_string.StringGenerate

;;;;;;;;;;;;;;;;;;;;;;; CRON
[linux.cron]
inherits: plugins.linux
description: Inlcudes files such as crontab, anacrontab, cronlogs and the different cron.
help_section: linux
jobs:
    linux.cron.crontab
    linux.cron.anacrontab
    linux.cron.system
    linux.cron.userSpecific
    linux.cron.cronlog

[linux.cron.crontab]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the crontab file.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.Cron outdir={crondir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/cron.csv',
  'crondir': '${plugins.linux:crondir}/'}
path: ${mountdir}/p*/etc/crontab

[linux.cron.anacrontab]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the crontab file.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.AnacronTab outdir={crondir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/anacron.csv',
  'crondir': '${plugins.linux:crondir}/'}
path: ${mountdir}/p*/etc/anacrontab

[linux.cron.system]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the cron.daily, cron.weekly, cron.hourly, cron.monthly, cron.d folder.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.Cron outdir={crondir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/cron.csv',
  'crondir': '${plugins.linux:crondir}/'
  }
path: ${mountdir}/p*/etc/cron.*/**

[linux.cron.userSpecific]
inherits: plugins.linux
description: Get the scheduled tasks or jobs of the cron.daily, cron.weekly, cron.hourly, cron.monthly, cron.d folder.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.Cron outdir={crondir}
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:crondir}/cron.csv',
  'crondir': '${plugins.linux:crondir}/'
  }
path: ${mountdir}/p*/var/**/*cron/**

[linux.cron.cronlog]
inherits: plugins.linux
description: Get the cronlog
jobs:
  linux.cron.cronlog.Compressed
  linux.cron.cronlog.NotCompressed
  linux.cron.cronlog.Csv_to_sorted_csv
  base.directory.DirectoryClear target={target}
target: ${plugins.linux:logsdir}/cron.logtmp.csv
default_params: {'target':'${target}'}

[linux.cron.cronlog.Compressed]
inherits: plugins.linux
description: Parse Cron logs compressed files
cascade:
  base.input.AllLinesInCompressedFile
  plugins.linux.RVT_cron.CronLog
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:logsdir}/cron.logtmp.csv'}
path: ${mountdir}/p*/var/log/cron.log.*.gz

[linux.cron.cronlog.NotCompressed]
inherits: plugins.linux
description: Parse Cron logs not compressed files
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_cron.CronLog
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
  base.directory.GlobFilter ftype='file'
default_params: {
  'outfile': '${plugins.linux:logsdir}/cron.logtmp.csv'}
path: ${mountdir}/p*/var/log/cron.log*

[linux.cron.cronlog.Csv_to_sorted_csv]
modules:
  base.output.CSVSink outfile='{outfile}' file_exists="OVERWRITE"
  base.mutations.SortResults fields="@timestamp"
  base.input.CSVReader progress.disable=True
default_params: {
  'outfile': '${plugins.linux:logsdir}/cron.log.csv'}
path: ${plugins.linux:logsdir}/cron.logtmp.csv

;;;;;;;;;;;;;;;;;;;;;;; SSH
[linux.ssh]
inherits: plugins.linux
description: Inlcudes files such as authorized_keys, known_hosts and config
help_section: linux
modules:
  base.directory.DirectoryFilter progress.disable='True'
  ssh.FileParser
path: ${DEFAULT:mountdir}
 
[ssh.FileParser]
inherits = base.directory.FileParser
parsers = (.*/.ssh/authorized_keys) linux.ssh.authorizedKeys
  (.*/.ssh/known_hosts) linux.ssh.knownHosts
  (.*/\.?ssh/.*onfig) linux.ssh.config

[linux.ssh.authorizedKeys]
inherits: plugins.linux
description: Get the ssh information from authorized_keys
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_ssh.SshAuthorizedKeys
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
default_params: {
  'outfile': '${plugins.linux:sshdir}/authorized_keys.csv'
  }

[linux.ssh.knownHosts]
inherits: plugins.linux
description: Get the ssh information from known_hosts
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_ssh.SshKnownHosts 
  base.output.CSVSink outfile={outfile} 
default_params: {
  'outfile': '${plugins.linux:sshdir}/known_hosts.csv'
  }

[linux.ssh.config]
inherits: plugins.linux
description: Get the ssh information from config files
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_ssh.SshConfig
  base.output.JSONSink outfile={outfile} file_exists="APPEND"
default_params: {
  'outfile': '${plugins.linux:sshdir}/config.json'
  }

;;;;;;;;;;;;;;;;;;;;;;; LOGIN
[linux.login]
inherits: plugins.linux
description: Inlcudes files such as shadow, passwd, nsswitch, wtmp
help_section: linux
jobs:
    linux.login.output
    linux.login.output_sorted

[linux.login.output]
inherits: plugins.linux
modules:
  base.directory.DirectoryFilter progress.disable='True'
  login.FileParser
path: ${DEFAULT:mountdir}
 
[login.FileParser]
inherits = base.directory.FileParser
parsers = (.*/etc/passwd) linux.login.passwd
  (.*/etc/shadow) linux.login.shadow
  (.*/etc/nsswitch.conf) linux.login.nsswitch
  (.*/etc/security/access.conf) linux.login.access
  (.*/var/log/wtmp*) linux.login.wtmp
  (.*/var/log/btmp*) linux.login.btmp

[linux.login.passwd]
inherits: plugins.linux
description: Get the essential information about user accounts.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_login.Passwd
  base.output.CSVSink outfile={outfile} file_exists="OVERWRITE"
default_params: {
  'outfile': '${plugins.linux:logindir}/passwd.csv'
  }

[linux.login.shadow]
inherits: plugins.linux
description: Get the essential information about user passwords.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_login.Shadow
  base.output.CSVSink outfile={outfile} file_exists="OVERWRITE"
default_params: {
  'outfile': '${plugins.linux:logindir}/shadow.csv'
  }

[linux.login.nsswitch]
inherits: plugins.linux
description: Get the information of nsswitch file.
cascade:
  base.input.AllLinesInFile progress.disable=True
  base.output.DummySink outfile={outfile} file_exists="OVERWRITE"
default_params: {
  'outfile': '${plugins.linux:logindir}/nsswitch.txt'
  }

[linux.login.access]
inherits: plugins.linux
description: Get the information of access.conf file.
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_login.Access
  base.output.CSVSink outfile={outfile} file_exists="OVERWRITE"
default_params: {
  'outfile': '${plugins.linux:logindir}/access.csv'
  }

[linux.login.wtmp]
inherits: plugins.linux
description: Get the information of wtmp file.
cascade:
  plugins.linux.RVT_login.Utmpdump progress.disable=False
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
default_params: {
  'outfile': '${plugins.linux:logindir}/wtmp_tmp.csv'
  }

[linux.login.btmp]
inherits: plugins.linux
description: Get the information of btmp file.
cascade:
  plugins.linux.RVT_login.Utmpdump progress.disable=False
  base.output.CSVSink outfile={outfile} file_exists="APPEND"
default_params: {
  'outfile': '${plugins.linux:logindir}/btmp_tmp.csv'
  }

[linux.login.output_sorted]
inherits: plugins.linux
description: Job to sort wtmp and btmp files
jobs:
  linux.login.utmp.Csv_to_sorted_csv path={infile_1} outfile={outfile_1}
  base.directory.DirectoryClear target={infile_1}
  linux.login.utmp.Csv_to_sorted_csv path={infile_2} outfile={outfile_2}
  base.directory.DirectoryClear target={infile_2}
infile_1: ${plugins.linux:logindir}/wtmp_tmp.csv
outfile_1: ${plugins.linux:logindir}/wtmp.csv
infile_2: ${plugins.linux:logindir}/btmp_tmp.csv
outfile_2: ${plugins.linux:logindir}/btmp.csv
default_params: {
  'infile_1':'${infile_1}',
  'outfile_1':'${outfile_1}',
  'infile_2':'${infile_2}',
  'outfile_2':'${outfile_2}',
  }

[linux.login.utmp.Csv_to_sorted_csv]
modules:
  base.output.CSVSink outfile={outfile} file_exists="OVERWRITE"
  base.mutations.SortResults fields="@timestamp"
  base.input.CSVReader progress.disable=True
default_params: {
  'outfile': '${plugins.linux:logindir}/wtmp.csv',
  'path': '${plugins.linux:logindir}/wtmp_tmp.csv'}
path: ${path}

;;;;;;;;;;;;;;;;;;;;;;; BASH
[linux.bash]
inherits: plugins.linux
description: Inlcudes files such as bashrc, bash_history, bash_logout, bash_profile, profile
help_section: linux
modules:
  base.directory.DirectoryFilter progress.disable='True'
  bash.FileParser
path: ${DEFAULT:mountdir}
 
[bash.FileParser]
inherits = base.directory.FileParser
parsers = (.*/.bashrc) linux.bash.bashFiles
  (.*/.bash_history) linux.bash.bashHistory
  (.*/.bash_logout) linux.bash.bashFiles
  (.*/.bash_profile) linux.bash.bashFiles
  (.*/.profile) linux.bash.bashFiles

[linux.bash.bashFiles]
inherits: plugins.linux
cascade:
  plugins.linux.RVT_bash.BashFilesCp bashdir={bashdir}
default_params: {
  'bashdir': '${plugins.linux:bashdir}'
  }

[linux.bash.bashHistory]
inherits: plugins.linux
description: Get the essential information about the bash_history of the different users. 
cascade:
  base.input.AllLinesInFile progress.disable=True
  plugins.linux.RVT_bash.BashHistory bashdir={bashdir}
  base.output.JSONSink outfile={outfile} file_exists="APPEND"
default_params: {
  'bashdir': '${plugins.linux:bashdir}',
  'outfile': '${plugins.linux:bashdir}/bash_history.json'
  }

;;;;;;;;;;;;;;;;;;;;;;; CHARACTERIZE
[linux.characterize]
inherits: plugins.linux
description: Describes basic information about linux partitions and users.
help_section: linux
modules:
  base.templates.TemplateSink template_file='{template_file}' outfile='{outfile}' file_exists='{file_exists}'
  plugins.linux.RVT_os_info.CharacterizeLinux aux_file='{aux_file}'
template_file: templates/os_summary_linux.mako
outfile: ${analysisdir}/os_summary.md
default_params: {'outfile':'${outfile}',
  'aux_file': '${plugins.linux:auxdir}/os_info.json',
  'template_file':'${template_file}',
  'file_exists':'OVERWRITE'}
params_help: {
  'outfile':'path to file were results are stored (in markdown format)',
  'aux_file': 'json file where OS info will be stored and used by other jobs',
  'template_file':'mako template to display results'}
