;;;;;;;;;;;; IP INFORMATION

[ip.info]
description: Get information from files with ip.
   Please, provide API keys in `alienvault_key` and `abuseipdb_key`
   as parameters or inside the section `IP_API_keys` in configuration files
help_section: common
cascade:
  base.input.AllLinesInFile progress.disable=True
  common.external_api_services.IP_info max_days=10000 alienvault_key='{alienvault_key}' abuseipdb_key='{abuseipdb_key}'
  base.output.MDTableSink fieldnames="ip country_name city abuseConfidenceScore tor_exit_node malicious"
default_params: {
  'alienvault_key': '',
  'abuseipdb_key': ''}


;;;;;;;;;;;; UTILS

[csv_to_sorted_csv]
description: Creates a new CSV file sorting the results of another CSV file
modules:
  base.directory.GlobClear target={path} ftype="file" run_after={run_after} run_before=False
  base.output.CSVSink outfile={outfile} file_exists=OVERWRITE
  base.mutations.SortResults fields={fields} reverse={reverse}
  base.input.CSVReader check_path_exists=False progress.disable=True
default_params: {
  'outfile': '',
  'path': '',
  'fields': '@timestamp',
  'reverse': False,
  'run_after': True}
params_help: {
  'outfile': 'path where the new sorted CSV file will be saved',
  'path': 'path to the original CSV file to be sorted',
  'fields': 'list of fields to be sorted by',
  'reverse': 'if True, sort in reverse order',
  'run_after': 'if True, delete the original unsorted CSV'}

;;;;;;;;;;; VELOCIRAPTOR

[velociraptor_hashes]
modules:
  base.commands.Command cmd="if [ ! -e '{analysisdir}/hashes' ]; then mkdir -p '{analysisdir}/hashes'; fi; cat $$(rg -l '\"OSPath\":.*\"Size\": [0-9]+, \"Hash\":' {sourcedir}/flows/*.json) >> {analysisdir}/hashes/velociraptor_hashes.json"
default_params: {
  'sourcedir': '${plugins.common:sourcedir}',
  'analysisdir': '${plugins.common:analysisdir}'}

