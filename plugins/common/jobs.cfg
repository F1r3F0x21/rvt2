params_help: {
  'outfile':'path to output file to be generated'}
path: ${mountdir}/p*/loki/loki_output_*.csv

[clamav.scan]
description: Scans directories with clamav

    Extra params:

    - onlyexes: Scan only exe files
    - user_folder: Scan only files under user folders
    - system: Scan only files in Windows, Program Files, ProgramData and Perflogs folders

    Examples:

    - Scan only exe files: rvt2 ... -j clamav.scan --params onlyexe=True
    - Scan only user directories: rvt2 ... -j clamav.scan --params user_folders=True
    - Scan exe files inside user and system directories: rvt2 ... -j clamav.scan --params user_folders=True system_folders=True onlyexe=True
help_section: common
cascade:
  base.input.CSVReader fieldnames='ScanDate Host Level Type Message' delimiter='AUTO'
  plugins.common.RVT_clamav.Clamav
default_params: {
  'outdir':'${plugins.common.RVT_clamav.Clamav:outdir}'}
params_help: {
  'outdir':'path to output file to be generated'}
path: ${mountdir}/

;;;;;;;;;;;; MICROSOFT 365

[office365.main]
description: Converts to MarkDown table format some of the common Office 365 logs extracted as CSV
help_section: common
modules:
  base.directory.DirectoryFilter progress.disable='True'
  office365.FileParser
path: ${DEFAULT:sourcedir}

[office365.FileParser]
description: Conversion to md tables for most commmon Office 365 logs
inherits = base.directory.FileParser
parsers = (.*MailBoxAuditLog.*.csv) office365.MailBoxAudit
    (.*AuditRecords.*.csv) office365.UnifiedAuditLogs
    (.*-UnifiedAuditLogs.*.csv) office365.UnifiedAuditLogs
    (.*-AzureADLogins-Interactive.*.csv) office365.InteractiveSignins
    (.*-AzureADLogins-NonInteractive.*.csv) office365.NonInteractiveSignins
    (.*-InteractiveSignIns_2.*.csv) office365.InteractiveSignins
    (.*-NonInteractiveSignIns_2.*.csv) office365.NonInteractiveSignins
    (.*-AzureAD_AuditLogs.*.csv) office365.AzureADAuditLogs
    (.*-MessageTrace.*.csv) office365.MessageTraceAPI
    (.*MTDetail_Message.*.csv) office365.MessageTrace
    (.*MessageTraceSummary.*.csv) office365.MessageTraceSummary
    (.*-UnifiedAuditLogs-.*STSLogon.*.csv) office365.AuditRecordsStsLogon
    (.*/messagetracking2.*.csv) exchange.MessageTracking
    (.*-AdminAuditLogs.*.csv) office365.AdminAuditLogs

[office365.UnifiedAuditLogs]
cascade:
  base.input.CSVReader delimiter=',' encoding='utf-8-sig'
  common.RVT_365.Parse_Audit_Logs
  base.mutations.RenameFields fields={rename_fields} new_fields={new_rename_fields}
  base.mutations.DateFields fields='Date' sep=' ' timespec='seconds' output_timezone='UTC' hide_tz='True'
  base.mutations.SortResults fields='Date'
  ;common.external_api_services.IP_info ip_field="ClientIP" date_field="CreationTime"
  base.output.CSVSink file_exists=APPEND outfile='{outfile}'
  base.output.MDTableSink outfile={outfile_short} file_exists=APPEND path_fields={backticks_fields} fieldnames={fieldnames_short} first_line={first_line_short}
default_params: {
  'outfile': '${plugins.common.RVT_365.Parse_Audit_Logs:outdir}/unified_audit_logs.csv',
  'outfile_short': '${plugins.common.RVT_365.Parse_Audit_Logs:outdir}/unified_audit_logs_short.md',
  'rename_fields': 'CreationTime\ UserId',
  'new_rename_fields': 'Date\ User',
  'fieldnames_short': 'Date\ User\ RecordType\ Operation\ ClientIP\ ResultStatus\ SessionId\ UserAgent\ OS\ BrowserType\ LogonError\ Subject\ ParentPath\ InternetMessageId\ ModifiedProperties\ ObjectId',
  'backticks_fields': 'User\ ParentPath\ ObjectId',
  'first_line_short': '[[[inlinetable(Operaciones\ registradas,m{1.6cm}m{2.9cm}m{2cm}m{2.1cm}m{5.4cm}m{2.1cm}m{1.9cm}HHHHH)]]]'}

