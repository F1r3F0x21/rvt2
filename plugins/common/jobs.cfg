  base.input.CSVReader fieldnames='ScanDate Host Level Type Message' delimiter='AUTO'
  base.directory.GlobFilter ftype='file'
  plugins.common.RVT_loki.Alerts
  base.output.CSVSink outfile="{outfile}" file_exists=OVERWRITE
