[ios]
plugindir:
description.file: ${plugindir}/README.md

[ios.preforensics]
description: Run a selected set of jobs in this module: unback, characterize, databases, cookies, whatsapp
  The path is an absolute path to a directory containing an iTunes backup, or a ZIP file containing an iTunes backup.
  If the backup is encrypted, define unback_command in the `ios.unback` section.
help_section: ios
jobs:
  ios.unback
  allocfiles
  ios.characterize
  ios.timeline
  ios.apollo_auto
  ios.databases
  ios.cookies
  ios.whatsapp
  ; ios.adv_whatsapp
  ; ios.jailbreak

[ios.unback]
description: Unback an iOS backup directory or zip file
module: ios.unback.Unback
help_section: ios
inherits: ios.common
; unback_command: python2 ${rvthome}/external_tools/iphone-dataprotection/python_scripts/backup_tool.py {bk_path} {extract_path}
; extract_path: ${sourcedir}/mnt/p01
; unzip_path: ${sourcedir}/unzip
; remove_unzip_path: True
path: ${imagedir}/${source}.zip
default_params: {
  'extract_path':'${sourcedir}/mnt/p01',
  'unzip_path': '${sourcedir}/unzip',
  'remove_unzip_path':'True',
  'unback_command': ''}
params_help: {
  'path': 'The path to the backup directory or the zip file to unback',
  'extract_path': 'The output directory for the unback',
  'unzip_path': 'In case of unbacking from a zip file, unzip the source to this path before unbacking',
  'remove_unzip_path': 'If set to True (default), delete the unzip directory after unzipping the backup zip file',
  'unback_command': 'External command to unback in case of encrypted backups. It is a Python string template that receives variables "bk_path" and "extract_path". For example: "python2 backup_tool.py {bk_path} {extract_path}". Check https://github.com/dinosec/iphone-dataprotection/blob/master/python_scripts/backup_tool.py'}

[ios.characterize]
description: Characterizes an iPhone backup. This backup must be previously unbacked. See job plugins.ios.unback.Unback
module: ios.characterization.Characterization
help_section: ios
default_params: {'outfile': '${analysisdir}/characterize.csv',
  'outfile_json': '${analysisdir}/os_info.json' }
params_help: {
  'path': 'path to device root directory',
  'outfile': 'path where generated csv file will be stored',
  'outfile_json': 'path where generated json file will be stored'}
path: ${sourcedir}/mnt/p01

[ios.timeline]
description: Parse manifest file and generate a body and a timeline csv using mactime
help_section: ios
inherits: ios.common
modules:
  base.commands.Command cmd="mactime -b {outfile_body} -y -d -i hour {outfile_csv_hour} > {outfile_csv}"
  base.output.CSVSink delimiter="|" write_header="False" outfile="{outfile_body}" quoting=0 file_exists=OVERWRITE
  ios.timeline.Timeline
default_params: {
    'outfile_body':'${timelinesdir}/${source}_BODY.csv',
    'outfile_csv_hour':'${timelinesdir}/${source}_hour_sum.csv',
    'outfile_csv':'${timelinesdir}/${source}_TL.csv'}
path: ${sourcedir}/mnt/p01

[ios.apollo_auto]
description: Parse iOS databases from the APOLLO project (https://github.com/mac4n6/APOLLO).
  You must run `ios.characterize` before or the job will not get the current iOS version.
help_section: ios
jobs:
  ios.characterization.LoadApolloVersion
  ios.apollo
path: ${sourcedir}/mnt/p01

[ios.apollo]
description: Parse iOS databases from the APOLLO project (https://github.com/mac4n6/APOLLO).
  You must include also the relevant configuration file from RVT2HOME/conf/ios/apollo. Check the device iOS version and run:
  `rvt2 -c RVT2HOME/conf/ios/apollo/rvt2-ios-VERSION.ini -j ios.apollo `
help_section: ios
modules:
  base.directory.DirectoryFilter
  ApolloProject.FileParser
path: ${sourcedir}/mnt/p01

[ios.databases]
description: Parse other iOS databases not in the APOLLO project, such as calendar, location, addressbook, notes or recordings.
help_section: ios
modules:
  base.directory.DirectoryFilter
  FileParser.ios.databases
path: ${sourcedir}/mnt/p01

[ios.cookies]
description: Parse cookies in /HomeDomain/Library/Cookies
help_section: ios
modules:
  base.output.CSVSink outfile='{outfile}'
  ios.cookies.Cookies
outfile: ${ios.common:iosdir}/cookies.csv
default_params: {
  'outfile':'${outfile}'}
path: ${sourcedir}/mnt/p01

[ios.whatsapp]
description: Parse and split WhastApp messages into several CSVs
help_section: ios
modules:
  base.mutations.ForEach run_job=ios.whatsapp_single
  base.mutations.SetFields fields='{{{{"outfile":"${ios.common:iosdir}/whatsapp/{{message_group}}/whatsapp.csv"}}}}'
  ios.whatsapp.WhatsAppChatSessions
path: ${sourcedir}/mnt/p01/
params_help: {
    'path': 'The path to the directory to parse'}

[ios.whatsapp_single]
description: Parse WhatsApp database filtered by message_group
help_section: ios
modules:
  base.output.CSVSink outfile='${ios.common:iosdir}/whatsapp/{message_group}/whatsapp.csv'
  ios.whatsapp.WhatsApp media_outdir='${ios.common:iosdir}/whatsapp/{{message_group}}' message_group='{message_group}' start_date='{start_date}' end_date='{end_date}' username='{username}'
message_group:
path: ${sourcedir}/mnt/p01/
default_params: {
    'message_group':'',
    'start_date':'',
    'end_date':'',
    'username':'',
    'localtime':'True'}
params_help: {
    'path': 'The path to the directory to parse',
    'message_group': 'Select a specific conversation to parse',
    'start_date': 'If set, output only messages from this date. Example format: 2018-12-25',
    'end_date': 'If set, output only messages until this date. Example format: 2020-01-15',
    'username': 'Whatsapp owner name. If not provided is taken from other WhatsApp configuration files',
    'localtime': 'If True, convert timestamps to current computer local timezone. If False, use UTC.'}

[ios.avere_whatsapp]
description: Check WhatsApp databases consistency for traces of manipulation. Only valid for old iOS versions
help_section: ios
modules: ios.adv_whatsapp.AdvWhatsapps outfile='{outfile}' extract_path='{extract_path}'
outfile: ${ios.common:iosdir}/adv_whatsapp.txt
extract_path: ${sourcedir}/mnt/p01/
default_params: {
    'outfile':'${outfile}',
    'extract_path': '${extract_path}'}
params_help: {
    'extract_path': 'The path to the IOS root directory',
    'outfile': 'Save the result in this file'}

[ios.chat_to_html]
description: Convert a WhatsApp conversation to an html file
help_section: ios
jobs:
    ios.chat_to_html_aux path='${ios.common:iosdir}/whatsapp/{message_group}/{input_whatsapp_csv}' message_group='{message_group}' template='{template}' outfile_name='{outfile_name}'
template: templates/chat2html.mako
default_params: {
    'message_group': 1,
    'input_whatsapp_csv': 'whatsapp.csv',
    'template':'${template}',
    'outfile_name':'conversation.html'}
params_help: {
    'message_group': 'Group the conversation belongs to. It is a number',
    'input_whatsapp_csv': 'CSV input file with transcripted conversation to convert, relative to message_group folder',
    'outfile_name':'output html filename to save results, relative to message_group folder',
    'template': 'Mako template file with html configuration. Relative to current working directory or RVTHOME'}

[ios.chat_to_html_aux]
modules:
    base.templates.TemplateSink outfile='${ios.common:iosdir}/whatsapp/{message_group}/{outfile_name}' template_file='{template}' file_exists=OVERWRITE
    base.input.CSVReader
default_params: {
  'outfile_name':'conversation.html'}

[ios.whatsapp_kw]
description: Search keywords in WhatsApp conversations
  The list of keywords must be defined in a separated file, `kw_file`, including
  the keyword label and (optionally) a regex as "LABEL:::REGEX".  If the regex is
  not provided, the modules uses the label as the regex to search.

  Example of keyword file:

  ```
  myfirstword
  mysecondword:::[Mm]y.econd{1,2}word
  ```

  The job `ios.whatsapp` must had been executed before the present job
help_section: ios
modules:
  ios.whatsapp.WhatsAppKeywords kw_file='{kw_file}'
default_params: {
  'kw_file': '${casedir}/searches_files/keywords',
  'outfile_name':'conversation_kw.html'}
params_help: {'kw_file':'path to file containing a list of keywords',
  'path':'path to the main results folder from `ios.whatsapp`',
  'outfile_name':'output html filename to save results, relative to message_group folder'}
path: ${ios.common:iosdir}/whatsapp

[ios.jailbreak]
description: Search for jailbreak traces in iOS devices. Requires the previous execution of `allocfiles`
help_section: ios
modules:
  base.commands.Command cmd="${ios:plugindir}/jailbreak_search.sh -s ${casedir}/${DEFAULT:source} -j ${outdir} -p ${ios:plugindir}"
outdir: ${ios.common:iosdir}/jailbreak
default_params: {
  'outdir':'${outdir}'}
params_help: {
  'outdir':'path to directory where generated files will be stored'}
