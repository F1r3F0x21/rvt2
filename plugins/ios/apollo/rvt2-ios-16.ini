	base.input.SQLiteReader
author = Sarah Edwards/mac4n6.com/@iamevltwin
notes = Charging - Smart Topoff Checkpoint
query = 
	SELECT
	DATETIME(ZOBJECT.ZSTARTDATE+978307200,'UNIXEPOCH') AS "START",
	DATETIME(ZOBJECT.ZENDDATE+978307200,'UNIXEPOCH') AS "END",
	(ZOBJECT.ZENDDATE - ZOBJECT.ZSTARTDATE) AS "USAGE IN SECONDS",
	(ZOBJECT.ZENDDATE - ZOBJECT.ZSTARTDATE)/60.00 AS "USAGE IN MINUTES",
	ZOBJECT.ZVALUEDOUBLE AS "VALUE",
	ZCUSTOMMETADATA.ZNAME AS "NAME",
	ZCUSTOMMETADATA.ZINTEGERVALUE AS "INTEGER VALUE",
	ZCUSTOMMETADATA.ZDOUBLEVALUE AS "DOUBLE VALUE",
	CASE ZOBJECT.ZSTARTDAYOFWEEK
	WHEN "1" THEN "Sunday"
	WHEN "2" THEN "Monday"
	WHEN "3" THEN "Tuesday"
	WHEN "4" THEN "Wednesday"
	WHEN "5" THEN "Thursday"
	WHEN "6" THEN "Friday"
	WHEN "7" THEN "Saturday"
	END "DAY OF WEEK",
	ZOBJECT.ZSECONDSFROMGMT/3600 AS "GMT OFFSET",
	DATETIME(ZOBJECT.ZCREATIONDATE+978307200,'UNIXEPOCH') AS "ENTRY CREATION",
	ZOBJECT.ZUUID AS "UUID",
