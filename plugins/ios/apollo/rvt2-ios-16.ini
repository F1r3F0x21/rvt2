	FROM ZOBJECT
	LEFT JOIN
	ZSTRUCTUREDMETADATA
	ON ZOBJECT.ZSTRUCTUREDMETADATA = ZSTRUCTUREDMETADATA.Z_PK
	LEFT JOIN
	ZSOURCE
	ON ZOBJECT.ZSOURCE = ZSOURCE.Z_PK
	LEFT JOIN Z_4EVENT
	ON ZOBJECT.Z_PK = Z_4EVENT.Z_11EVENT
	LEFT JOIN ZCUSTOMMETADATA
	ON Z_4EVENT.Z_4CUSTOMMETADATA = ZCUSTOMMETADATA.Z_PK
	WHERE
