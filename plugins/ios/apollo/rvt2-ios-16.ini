	HISTORY_ITEMS.URL AS "URL",
	HISTORY_ITEMS.VISIT_COUNT AS "VISIT COUNT",
	HISTORY_VISITS.TITLE AS "TITLE",
	CASE HISTORY_VISITS.ORIGIN
