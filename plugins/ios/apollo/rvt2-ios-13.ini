	FROM ZOBJECT
	LEFT JOIN
	ZSTRUCTUREDMETADATA
	ON ZOBJECT.ZSTRUCTUREDMETADATA = ZSTRUCTUREDMETADATA.Z_PK
	LEFT JOIN
	ZSOURCE
