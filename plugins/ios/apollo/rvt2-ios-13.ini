[FileParser.ios.sms_chat_message_delivered]
modules = 
	base.output.CSVSink file_exists=OVERWRITE outfile="${ios.common:iosdir}/apollo/sms_chat_message_delivered.csv"
	base.input.SQLiteReader
author = Sarah Edwards/mac4n6.com/@iamevltwin
notes = SMS and Chat Messages, when the message wAS delivered.
query = 
	SELECT
	CASE
	WHEN LENGTH(MESSAGE.DATE)=18 THEN DATETIME(MESSAGE.DATE/1000000000+978307200,'UNIXEPOCH')
	WHEN LENGTH(MESSAGE.DATE)=9 THEN DATETIME(MESSAGE.DATE + 978307200,'UNIXEPOCH')
	ELSE "N/A"
	END "MESSAGE DATE",
	CASE
	WHEN LENGTH(MESSAGE.DATE_DELIVERED)=18 THEN DATETIME(MESSAGE.DATE_DELIVERED/1000000000+978307200,"UNIXEPOCH")
	WHEN LENGTH(MESSAGE.DATE_DELIVERED)=9 THEN DATETIME(MESSAGE.DATE_DELIVERED+978307200,"UNIXEPOCH")
	ELSE "N/A"
	END "DATE DELIVERED",
	CASE
	WHEN LENGTH(MESSAGE.DATE_READ)=18 THEN DATETIME(MESSAGE.DATE_READ/1000000000+978307200,"UNIXEPOCH")
	WHEN LENGTH(MESSAGE.DATE_READ)=9 THEN DATETIME(MESSAGE.DATE_READ+978307200,"UNIXEPOCH")
	ELSE "N/A"
	END "DATE READ",
	MESSAGE.TEXT AS "MESSAGE",
	HANDLE.ID AS "CONTACT ID",
	MESSAGE.SERVICE AS "SERVICE",
	MESSAGE.ACCOUNT AS "ACCOUNT",
	MESSAGE.IS_DELIVERED AS "IS DELIVERED",
	MESSAGE.IS_FROM_ME AS "IS FROM ME",
	ATTACHMENT.FILENAME AS "FILENAME",
	ATTACHMENT.MIME_TYPE AS "MIME TYPE",
	ATTACHMENT.TRANSFER_NAME AS "TRANSFER TYPE",
	ATTACHMENT.TOTAL_BYTES AS "TOTAL BYTES"
	FROM MESSAGE
	LEFT OUTER JOIN MESSAGE_ATTACHMENT_JOIN ON MESSAGE.ROWID = MESSAGE_ATTACHMENT_JOIN.MESSAGE_ID
	LEFT OUTER JOIN ATTACHMENT ON MESSAGE_ATTACHMENT_JOIN.ATTACHMENT_ID = ATTACHMENT.ROWID
	LEFT OUTER JOIN HANDLE ON MESSAGE.HANDLE_ID = HANDLE.ROWID
	WHERE "DATE DELIVERED" IS NOT "N/A"

[FileParser.ios.screentime_timed_items]
modules = 
	base.output.CSVSink file_exists=OVERWRITE outfile="${ios.common:iosdir}/apollo/screentime_timed_items.csv"
	base.input.SQLiteReader
author = Sarah Edwards/mac4n6.com/@iamevltwin
notes = Screen Time - App (By Hour)
query = 
	SELECT
	DATETIME(ZUSAGEBLOCK.ZSTARTDATE+978307200,'UNIXEPOCH') AS 'HOUR',
	ZUSAGETIMEDITEM.ZBUNDLEIDENTIFIER AS  'BUNDLE ID',
	ZUSAGETIMEDITEM.ZDOMAIN AS 'DOMAIN',
	CASE ZUSAGECATEGORY.ZIDENTIFIER
	WHEN 'DH0011' THEN 'Unspecified1'
	WHEN 'DH0012' THEN 'Unspecified2'
	WHEN 'DH0013' THEN 'Unspecified3'
	WHEN 'DH1001' THEN 'Games'
	WHEN 'DH1002' THEN 'Social Networking'
	WHEN 'DH1003' THEN 'Entertainment'
	WHEN 'DH1004' THEN 'Creativity'
	WHEN 'DH1005' THEN 'Productivity'
	WHEN 'DH1006' THEN 'Education'
	WHEN 'DH1007' THEN 'Reading & Reference'
	WHEN 'DH1008' THEN 'Health & Fitness'
	WHEN 'DH1009' THEN 'Other'
	ELSE ZUSAGECATEGORY.ZIDENTIFIER
	END AS 'CATEGORY ID',
	ZUSAGETIMEDITEM.ZTOTALTIMEINSECONDS  AS 'APP USAGE TIME ITEM (SECONDS)',
	ZUSAGETIMEDITEM.ZTOTALTIMEINSECONDS/60.00 AS 'APP USAGE TIME ITEM (MINUTES)',
	ZUSAGEBLOCK.ZNUMBEROFPICKUPSWITHOUTAPPLICATIONUSAGE AS 'NUMBER OF PICKUPS W/O APP USAGE',
	ZCOREDEVICE.ZNAME AS 'NAME',
	ZCOREDEVICE.ZIDENTIFIER AS 'DEVICE ID',
	ZCOREDEVICE.ZLOCALUSERDEVICESTATE AS 'LOCAL USER DEVICE STATE',
	CASE ZCOREDEVICE.ZPLATFORM
	WHEN 0 THEN 'Unknown'
	WHEN 1 THEN 'macOS'
	WHEN 2 THEN 'iOS'
	WHEN 4 THEN 'Apple Watch'
	ELSE ZPLATFORM
	END AS PLATFORM,
	ZCOREUSER.ZGIVENNAME AS 'GIVEN NAME',
	ZCOREUSER.ZFAMILYNAME AS 'FAMILY NAME',
	ZCOREUSER.ZFAMILYMEMBERTYPE AS 'FAMILY MEMBER TYPE',
	ZCOREUSER.ZAPPLEID AS 'APPLE ID',
	ZCOREUSER.ZDSID AS 'DSID',
	ZCOREUSER.ZALTDSID AS 'ALT DSID',
	ZUSAGETIMEDITEM.Z_PK AS 'ZUSAGETIMEDITEM TABLE ID'
	FROM ZUSAGETIMEDITEM
	LEFT JOIN ZUSAGECATEGORY ON ZUSAGECATEGORY.Z_PK == ZUSAGETIMEDITEM.ZCATEGORY
	LEFT JOIN ZUSAGEBLOCK ON ZUSAGECATEGORY.ZBLOCK == ZUSAGEBLOCK.Z_PK
	LEFT JOIN ZUSAGE ON ZUSAGEBLOCK.ZUSAGE == ZUSAGE.Z_PK
	LEFT JOIN ZCOREUSER ON ZUSAGE.ZUSER == ZCOREUSER.Z_PK
	LEFT JOIN ZCOREDEVICE ON ZUSAGE.ZDEVICE == ZCOREDEVICE.Z_PK

