[indexer.events.AppCompatCache]
module: indexer.events.AppCompatCache
outfile: ${ecs:outdir}/${source}.21_appcompatcache.json

[indexer.events.Amcache]
module: indexer.events.Amcache
outfile: ${ecs:outdir}/${source}.22_amcache.json

[indexer.events.Syscache]
module: indexer.events.Syscache
outfile: ${ecs:outdir}/${source}.23_syscache.json

[indexer.events.UserAssist]
module: indexer.events.UserAssist
outfile: ${ecs:outdir}/${source}.24_userassist.json

[indexer.events.Shellbags]
module: indexer.events.Shellbags
