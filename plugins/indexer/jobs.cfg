  events.userassist index_name='{index_name}'
  events.registry.autorun index_name='{index_name}'
  events.registry.services index_name='{index_name}'
  events.registry.tasks index_name='{index_name}'
  events.shellbags index_name='{index_name}'
  events.tasks index_name='{index_name}'
  events.prefetch index_name='{index_name}'
  events.ccm index_name='{index_name}'
  events.usb index_name='{index_name}'
  events.recycle_bin index_name='{index_name}'
  events.srum index_name='{index_name}'
  events.logs index_name='{index_name}'
