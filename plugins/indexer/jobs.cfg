[events.compromise_logs]
description: Convert selected Windows event logs to a format suitable for Elastic
help_section: events
modules:
  base.commands.Command cmd="mv ${outfile}.temp ${outfile}"
  base.commands.Command cmd="cat ${outfile} | {jq} -s 'sort_by(._source.\"@timestamp\")' | {jq} 'reverse' | {jq} -c .[]" stdout="{outfile}.temp"
  base.output.JSONSink outfile='{outfile}' file_exists=OVERWRITE
  plugins.indexer.elastic.ElasticSearchAdapter name='{index_name}'
  indexer.events.EventLogs classify=False
  windows.RVT_eventartifacts.Filter_Events events_dict="{events_dict}"
  base.input.JSONReader
events_dict: {"106": "Microsoft-Windows-TaskScheduler", "140": "Microsoft-Windows-TaskScheduler", "141": "Microsoft-Windows-TaskScheduler", "200": "Microsoft-Windows-TaskScheduler", "201": "Microsoft-Windows-TaskScheduler", "9707": "Microsoft-Windows-Shell-Core", "9708": "Microsoft-Windows-Shell-Core", "4624": "Microsoft-Windows-Security-Auditing", "4625": "Microsoft-Windows-Security-Auditing", "4698": "Microsoft-Windows-Security-Auditing", "4699": "Microsoft-Windows-Security-Auditing", "4700": "Microsoft-Windows-Security-Auditing", "4701": "Microsoft-Windows-Security-Auditing", "4702": "Microsoft-Windows-Security-Auditing", "5857": "Microsoft-Windows-WMI-Activity", "5860": "Microsoft-Windows-WMI-Activity", "5861": "Microsoft-Windows-WMI-Activity", "7034": "Service Control Manager", "7035": "Service Control Manager", "7036": "Service Control Manager", "7040": "Service Control Manager", "7045": "Service Control Manager"}
default_params: {
  'outfile':'${outfile}',
  'index_name':'${ecs:ir_es_index_name}',
  'events_dict':'${events_dict}',
  'jq':'${plugins.common:jq}'}
params_help: {
  'path': 'The path to the file generated by `windows.events`',
  'outfile': 'Path to the output event file.',
  'events_dict': 'Dictionary as string where the key is the event code and the value the event provider to filter by',
  'index_name': 'Name of the indice in ElasticSearch'}
outfile: ${indexer.events.CompromiseEventLogs:outfile}
path: ${plugins.windows:eventdir}/compromise_events.json


