[macos]
plugindir:
description: This plugin extracts and analyzes forensic artifacts from a MacOS system.

[macforensics]
description: Jobs to be run on a disk image at the beginning
help_section: macos
jobs:
    mount
    allocfiles
    browsers
    fs_timeline
    plugins.macos.RVT_macos.QuickLook
    plugins.macos.RVT_macos.ASL
    plugins.macos.RVT_macos.FSEvents
    plugins.macos.RVT_macos.Spotlight
    ; plugins.macos.RVT_macos.KnowledgeC
    plugins.macos.RVT_macos.ParseDSStore
    plugins.macos.RVT_macos.ParsePlist
    plugins.macos.RVT_macos.MacMRU
    plugins.macos.RVT_macos.BasicInfo
    plugins.macos.RVT_macos.NetworkUsage
    plugins.macos.RVT_macos.Network
    plugins.macos.RVT_macos.Quarantine
    plugins.macos.RVT_macos.ParseUnifiedLogReader
    plugins.common.RVT_string.StringGenerate

;;;;;;;;;;;;;;;;;;;;;;; MEMORY

[mac.volatility]
description: Creates output files from volatility list of plugins agains memory file
help_section: common
modules:
    plugins.common.RVT_memory.Volatility outdir={outdir} volatility_plugins={volatility_plugins}
default_params: {
  'outdir':'${plugins.common.RVT_memory.Volatility:outdir}',
  'volatility_plugins':'"mac.pslist.PsList mac.pstree.PsTree mac.lsmod.LsMod mac.netstat.Netstat mac.proc_maps.ProcMaps mac.proc_info.ProcInfo mac.check_syscall.CheckSyscall mac.malfind.Malfind mac.list_files.ListFiles mac.threads.Threads mac.vfsevents.VFSEvents mac.check_trap_table.CheckTrapTable"'}
params_help: {
  'outdir':'path to directory where generated files will be stored',
  'volatility_plugins':'Space separated list of volatility plugins to run'}
