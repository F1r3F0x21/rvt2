[windows.source_summary]
description: Create summary tables for most relevant artifacts previously parsed, both in CSV and MD format.
  os_summary.md: Operating system characteristics and users
  execution_summary.csv/md: Includes the next execution related artifacts:
    - Amcache
    - Syscache
    - Userassist
    - Prefetch
    - Activitiescache
    - CCM
    - Autorun events
  persistence_summary.csv/md: Includes the next persistence related artifacts:
    - Local user creation
    - Scheduled tasks
    - Installed services
    - Autorun keys
    - Startup folders
  activity_summary.csv/md: Includes the next artifacts describing user interaction:
    - Recentiles (lnk)
    - Jumplists
    - Shellbags
    - Browsers history
    - Browsers downloads
    - Activitiescache
  incoming_summary.csv/md: Includes the next artifacts describing incoming connections:
    - Incoming RDP connections
    - Remote desktop apps incoming connections
  outgoing_summary.csv/md: Includes the next artifacts describing outgoing connections:
    - Outgoing RDP connections
    - Remote desktop apps outgoing connections
  summary.md: Set of all previous tables in MD format. Including also:
    - UAL (user access logging)
    - Installed programs
    - Appcompatcache
    - Shimcache
    - EDR/AV events

help_section: windows
jobs:
  copy_file outfile={outfile_global} infile=${analysisdir}/os_summary.md
  windows.summary sections={sections}
  windows.summary_artifacts sections={sections}
  windows.sort_summary_category_md outfile_md={execution_md} path={execution_csv} out_fieldnames='"Time\ (UTC)"\ "Process"\ "Hash"\ "User"\ "Artifact"' sort_fields='"Time\ (UTC)"' path_fields="Process" file_exists=OVERWRITE
  windows.sort_summary_category_md outfile_md={persistence_md} path={persistence_csv} out_fieldnames='"Time\ (UTC)"\ "Task\ or\ Service"\ "User\ or\ Author"\ "Artifact"' sort_fields='"Time\ (UTC)"' path_fields='"Task\ or\ Service"\ "User\ or\ Author"' file_exists=OVERWRITE
  windows.sort_summary_category_md outfile_md={activity_md} path={activity_csv} out_fieldnames='"Last\ Time\ (UTC)"\ "Resource"\ "First\ Time\ (UTC)"\ "User"\ "Artifact"' sort_fields='"Last\ Time\ (UTC)"' path_fields="Resource" file_exists=OVERWRITE
  windows.sort_summary_category_md outfile_md={incoming_md} path={incoming_csv} out_fieldnames='"Login\ (UTC)"\ "Logoff\ (UTC)"\ "Duration"\ "User"\ "IP"\ "Hostname"\ "Artifact"' sort_fields='"Login\ (UTC)"' path_fields="User" file_exists=OVERWRITE
  windows.sort_summary_category_md outfile_md={outgoing_md} path={outgoing_csv} out_fieldnames='"Login\ (UTC)"\ "Logoff\ (UTC)"\ "Duration"\ "SourceUser"\ "TargetUser"\ "IP"\ "Hostname"\ "Artifact"' sort_fields='"Login\ (UTC)"' path_fields="SourceUser" file_exists=OVERWRITE
default_params: {
  'sections': 'data.rdp_incoming\ data.rdp_outgoing\ data.remote_desktop\ data.remote_desktop2\ data.openssh\ data.ual\ data.programs\ data.prefetch\ data.amcache\ data.syscache\ data.appcompat\ data.shimcache\ data.userassist\ data.autoruns\ data.activitiescache_exec\ data.ccm\ data.services\ data.runkeys\ data.tasks_registry\ data.scheduled_tasks\ data.job_tasks\ data.startup\ data.user_creation\ data.recentfiles\ data.shellbags\ data.activitiescache\ data.browsers_history\ data.downloads\ data.edr_av\ data.hayabusa\ data.creation_compressed',
  'outfile_global': '${analysisdir}/summary.md',
  'execution_csv': '${analysisdir}/execution_summary.csv',
  'execution_md': '${analysisdir}/execution_summary.md',
  'persistence_csv': '${analysisdir}/persistence_summary.csv',
  'persistence_md': '${analysisdir}/persistence_summary.md',
  'activity_csv': '${analysisdir}/activity_summary.csv',
  'activity_md': '${analysisdir}/activity_summary.md',
  'incoming_csv': '${analysisdir}/incoming_summary.csv',
  'incoming_md': '${analysisdir}/incoming_summary.md',
  'outgoing_csv': '${analysisdir}/outgoing_summary.csv',
  'outgoing_md': '${analysisdir}/outgoing_summary.md'}

; WARNING: Beware with the order of sections. The first artifact for every category must be the one with file_exists_category: OVERWRITE

[windows.summary]
modules:
  base.mutations.ForEach run_job=windows.output_to_summary
  base.mutations.FeedJobsParameters sections={sections}
default_params: {
  'sections': "",
  'outfile_global': '${analysisdir}/summary.md'}

[windows.summary_artifacts]
modules:
  base.mutations.ForEach run_job=windows.category_summary
  base.mutations.FeedJobsParameters sections={sections}
default_params: {
  'sections': ""}

[windows.output_to_summary]
description: Given a parsed output file and a set of parameters, generate summary MD and CSV files.
modules:
  base.output.MDTableSink outfile='{outfile_global}' fieldnames={out_summary_fields} path_fields={path_summary_fields} file_exists={file_exists_global} force_headers=True first_line="{first_summary_line}" chars_escaped="{chars_escaped}"
  base.output.MDTableSink outfile='{outdir_artifacts}/{artifact}.md' fieldnames={out_summary_fields} path_fields={path_summary_fields} file_exists=OVERWRITE skip_headers={skip_headers} chars_escaped="{chars_escaped}"
  base.mutations.SpaceText fields={space_fields} steps={steps}
  base.output.CSVSink outfile='{outdir_artifacts}/{artifact}.csv' fieldnames={out_summary_fields} file_exists=OVERWRITE skip_headers={skip_headers} quoting=0
  base.mutations.GetFields fields={out_summary_fields}
  base.mutations.RenameFields fields={rename_summary_fields} new_fields={new_rename_summary_fields}
  base.mutations.SetFields presets='{{"Host":"{source}"}}'
  base.mutations.SetFields presets='{{"Artifact":"{artifact}"}}'
  base.mutations.SortResults fields={sort_fields}
  base.directory.GlobFilter ftype='file'
  base.mutations.DateFields fields={date_fields} sep=' ' timespec='seconds' output_timezone='UTC' hide_tz='True' missing_action={missing_action}
  base.mutations.FilterData conditions={conditions_summary} operator={operator_summary} is_regex={is_regex_summary}
  base.input.CSVReader delimiter={input_delimiter}
default_params: {
  'date_fields': '',
  'sort_fields': '',
  'space_fields': '',
  'steps': 4,
  'path_fields': '',
  'out_summary_fields': '',
  'rename_summary_fields': '',
  'new_rename_summary_fields': '',
  'skip_headers': 'False',
  'missing_action': 'IGNORE',
  'conditions_summary': '',
  'is_regex_summary': 'False',
  'operator_summary': 'or',
  'first_summary_line': '',
  'artifact': '',
  'source': '${DEFAULT:source}',
  'file_exists_global': 'APPEND',
  'outdir_artifacts': '${analysisdir}/artifacts',
  'outfile_global': '${analysisdir}/summary.md',
  'chars_escaped': '|',
  'input_delimiter': ';'}

[windows.category_summary]
description: Define a new MD table gathering artifacts summary files from the specified category (execution, pesistance, activity).
modules:
  base.output.CSVSink outfile='${analysisdir}/{summary_category}_summary.csv' file_exists={file_exists_category} quoting=0
  base.mutations.SpaceText fields={space_fields} steps={steps}
  base.mutations.GetFields fields={out_category_fields}
  base.mutations.RenameFields fields={rename_category_fields} new_fields={new_rename_category_fields}
  base.mutations.SortResults fields={sort_fields}
  base.mutations.SkipResults fields={skip_if_missing} fields_not_present=KEEP condition={skip_condition}
  base.directory.GlobFilter ftype='file'
  base.mutations.SetFields presets='{{"Host":"{source}"}}'
  base.mutations.SetFields presets='{{"Artifact":"{artifact}"}}'
  base.mutations.DateFields fields={date_fields} sep=' ' timespec='seconds' output_timezone='UTC' hide_tz='True'
  base.mutations.FilterData conditions={conditions_category} operator={operator_category} is_regex={is_regex_category}  
  base.input.CSVReader delimiter={input_delimiter}
default_params: {
  'date_fields': '',
  'sort_fields': '',
  'space_fields': '',
  'steps': 4,
  'out_category_fields': '',
  'rename_category_fields': '',
  'new_rename_category_fields': '',
  'skip_if_missing': '',
  'artifact': '',
  'conditions_category': '',
  'is_regex_category': 'False',
  'operator_category': 'or',  
  'skip_condition': 'all',
  'source': '${DEFAULT:source}',
  'summary_category': '',
  'file_exists_category': 'APPEND',
  'input_delimiter': ';'}

[windows.sort_summary_category_md]
modules:
  base.output.MDTableSink outfile='{outfile_md}' fieldnames={out_fieldnames} path_fields={path_fields} file_exists={file_exists} skip_headers={skip_headers} chars_escaped="{chars_escaped}"
  base.mutations.SortResults fields={sort_fields}
  base.input.CSVReader check_path_exists=False
default_params: {
  'sort_fields': '',
  'path_fields': '',
  'skip_headers': 'False',
  'chars_escaped': '|',
  'source': '${DEFAULT:source}',
  'file_exists': 'APPEND'}

[windows.timeframe]
description: Filter the most relevant artifact analysis files by a date interval.
  At least one of "start" or "end" parameters must be specified.
  
  Example: `rvt2 -j windows.timeframe --params start='2024-01-06' end='2024-01-08 15:00'`

  Results will be saved in a new directory `{start}_{end}` under `analysis`.
help_section: windows
jobs:
  copy_file outfile='${analysisdir}/{start}_{end}_timeframe/summary.md' infile=${analysisdir}/os_summary.md
  windows.summary_timeframe
  windows.category_timeframe path=${analysisdir}/{execution_name}.csv filter_date_field='"Time (UTC)"' sort_field='"Time\ (UTC)"' path_fields="Process" file_exists=OVERWRITE filename_stem={execution_name}
  windows.category_timeframe path=${analysisdir}/{persistence_name}.csv filter_date_field='"Time (UTC)"' sort_field='"Time\ (UTC)"' path_fields='"Task\ or\ Service"' file_exists=OVERWRITE filename_stem={persistence_name}
  windows.category_timeframe path=${analysisdir}/{activity_name}.csv filter_date_field='"Last Time (UTC)"' sort_field='"Last\ Time\ (UTC)"' path_fields="Resource" file_exists=OVERWRITE filename_stem={activity_name}
  windows.category_timeframe path=${analysisdir}/{incoming_name}.csv filter_date_field='"Login (UTC)"' sort_field='"Login\ (UTC)"' path_fields="User" file_exists=OVERWRITE filename_stem={incoming_name}
  windows.category_timeframe path=${analysisdir}/{outgoing_name}.csv filter_date_field='"Login (UTC)"' sort_field='"Login\ (UTC)"' path_fields="User" file_exists=OVERWRITE filename_stem={outgoing_name}
default_params: {
  'execution_name': 'execution_summary',
  'persistence_name': 'persistence_summary',
  'activity_name': 'activity_summary',
  'incoming_name': 'incoming_summary',
  'outgoing_name': 'outgoing_summary'}
params_help: {
  'start': 'Initial date of the time frame in format "YY-mm-dd HH:MM:SS". Date is mandatory but time is optional',
  'end': 'Last date of the time frame in format "YY-mm-dd HH:MM:SS". Date is mandatory but time is optional'}

[windows.summary_timeframe]
modules:
  base.mutations.ForEach run_job=windows.summary_timeframe_aux
  base.mutations.AddFields section='data.{{filename_stem}}' fields='{{{{"filter_date_field":"{{filter_date_field}}","missing_action_filter":"{{missing_action_filter}}","path_summary_fields":"{{path_summary_fields}}","first_summary_line":"{{first_summary_line}}"}}}}'
  base.mutations.CommonFields filename_stem=True
  base.directory.GlobFilter ftype='file' recursive=False
  base.mutations.MirrorOptions include_section=True relative_path=False
path: ${analysisdir}/artifacts/*.csv
default_params: {
  'start': '2024-01-01',
  'end': '2025-01-01'}

[windows.summary_timeframe_aux]
modules:
  base.output.MDTableSink outfile='${analysisdir}/{start}_{end}_timeframe/summary.md' path_fields={path_summary_fields} file_exists='APPEND' skip_headers={skip_headers} first_line="{first_summary_line}" chars_escaped="{chars_escaped}"
  base.output.MDTableSink outfile='${analysisdir}/{start}_{end}_timeframe/artifacts/{filename_stem}.md' path_fields={path_summary_fields} file_exists=OVERWRITE skip_headers={skip_headers} chars_escaped="{chars_escaped}"
  base.output.CSVSink outfile='${analysisdir}/{start}_{end}_timeframe/artifacts/{filename}' file_exists=OVERWRITE quoting=0
  base.mutations.DateRange field={filter_date_field} start={start} end={end} action_if_missing={missing_action_filter}
  base.directory.GlobFilter ftype='file'
  base.input.CSVReader
path: ${analysisdir}/artifacts/*.csv
default_params: {
  'filter_date_field': '',
  'missing_action_filter': 'KEEP',
  'outdir_artifacts': '${analysisdir}/artifacts',
  'skip_headers': 'False',
  'path_summary_fields': '',
  'first_summary_line': '',
  'chars_escaped': '|',
  'start': '2024-01-01',
  'end': '2025-01-01'}

[windows.category_timeframe]
modules:
  base.output.MDTableSink outfile='${analysisdir}/{start}_{end}_timeframe/{filename_stem}.md' path_fields={path_fields} file_exists=OVERWRITE skip_headers={skip_headers} chars_escaped="{chars_escaped}"
  base.output.CSVSink outfile='${analysisdir}/{start}_{end}_timeframe/{filename_stem}.csv' file_exists=OVERWRITE quoting=0
  base.mutations.SortResults fields={sort_field}
  base.mutations.DateRange field={filter_date_field} start={start} end={end} action_if_missing={missing_action_filter}
  base.directory.GlobFilter ftype='file'
  base.input.CSVReader
path: ${analysisdir}/*_summary.csv
default_params: {
  'filter_date_field': '',
  'missing_action_filter': 'KEEP',
  'outdir_artifacts': '${analysisdir}/artifacts',
  'skip_headers': 'False',
  'chars_escaped': '|',
  'start': '2024-01-01',
  'end': '2025-01-01'}

;;;;;;;;;;;;;;;;;;;;;;; ARTIFACTS ACCESS SUMMARY (INCOMING / OUTGOING)

[data.rdp_incoming]
artifact: rdp_incoming
path: ${plugins.windows:eventsanalysisdir}/rdp_incoming.csv
in_fields: 'Logon Logoff SourceIP SourceHost TargetUser Outcome Duration Reason ConnectionName ActivityID SessionID Comment'
date_fields: '"Logon" "Logoff"'
sort_fields: '"Logon" "Logoff"'
rename_summary_fields: '"Logon" "Logoff" "SourceIP" "TargetUser"'
new_rename_summary_fields: '"Login (UTC)" "Logoff (UTC)" "Source IP" "User"'
out_summary_fields: '"Login (UTC)" "Logoff (UTC)" "Duration" "User" "Source IP" "Comment"'
path_summary_fields: User
conditions_summary: '[("Outcome","success"),("Comment","^(?!Possible timeout$$).*$$")]'
is_regex_summary: True
operator_summary: and
missing_action: SKIP_ALL
first_summary_line: \\n## RDP Incoming\\n\\n[[[inlinetable(Incoming RDP sessions,m{2.1cm}m{2.1cm}Hm{5.2cm}m{2.7cm}H)]]]
summary_category: incoming
file_exists_category: OVERWRITE
rename_category_fields: '"Logon" "Logoff" "SourceIP" "TargetUser" "SourceHost"'
new_rename_category_fields: '"Login (UTC)" "Logoff (UTC)" "IP" "User" "Hostname"'
out_category_fields: '"Login (UTC)" "Logoff (UTC)" "Duration" "User" "IP" "Hostname" "Artifact"'
filter_date_field: 'Login (UTC)'
conditions_category: '[("Outcome","success"),("Comment","^(?!Possible timeout$$).*$$")]'
is_regex_category: True
operator_category: and
missing_action_filter: SKIP

