  base.directory.GlobFilter ftype='file' sorted="True"
  base.output.CSVSink outfile="{outfile}" file_exists=APPEND
  plugins.windows.RVT_exec.PCARecord
  base.mutations.DateFields fields='"StartDate\ (UTC)"' input_timezone="UTC"
  base.input.CSVReader delimiter="|" encoding='utf-16le' fieldnames='"StartDate\ (UTC)" Status Path Description Vendor Version ProgramId Exitcode'
default_params: {
  'outfile':'${plugins.windows.RVT_exec.PSHistory:outdir}/pca_general_db.csv'}
path: ${mountdir}/p*/Windows/appcompat/pca/PcaGeneralDb*.txt

;;;;;;;;;;;;;;;;;;;;;;; MEMORY

[windows.memory]
description: Use volatility to get information of a memory image file, such as the physical memory of a device as retrieved by F-ResponseDecompress hiberfil.sys and extract some artifacts.
  Requires `windows.characterize` if no profile is provided.
help_section: windows
modules:
    plugins.windows.RVT_memory.MemoryShare outdir={outdir} volatility_plugins={volatility_plugins} profile={profile} volume_id={volume_id}
default_params: {
  'outdir':'${plugins.windows.RVT_memory.MemoryShare:outdir}',
  'volatility_plugins':'windows.info pstree netscan filescan shutdowntime mftparser',
  'profile':'',
  'volume_id':'p01'}
params_help: {
  'outdir':'path to directory where generated files will be stored',
  'volatility_plugins':'Space separated list of volatility plugins to run',
  'profile':'Windows profile describing version as expected by volatility. Ex: Win10x64. It will be searched in the current registry if not provided',
  'volume_id':'volume identifier, such as partition number. Ex: p03'}
path: ${mountdir}/memory/memory.img

[windows.volatility]
description: Creates output files from volatility list of plugins agains memory file
help_section: common
modules:
    plugins.common.RVT_memory.Volatility outdir={outdir} volatility_plugins={volatility_plugins}
default_params: {
  'outdir':'${plugins.common.RVT_memory.Volatility:outdir}',
  'volatility_plugins':'"windows.info windows.pslist.PsList windows.pstree.PsTree windows.dlllist.DllList windows.handles.Handles windows.netscan.NetScan windows.cmdline.CmdLine windows.sockets.Sockets windows.envars.Envars windows.getservicesids.GetServiceSIDs windows.malfind.Malfind windows.drivermodule.DriverModule windows.registry.userassist.UserAssist windows.registry.shimcache.ShimCache windows.registry.amcache.AmCache windows.registry.hivelist.HiveList"'}
params_help: {
  'outdir':'path to directory where generated files will be stored',
  'volatility_plugins':'Space separated list of volatility plugins to run'}

[windows.memory_velociraptor]
help_section: windows
description: Creates output files from volatility list of plugins agains memory file from velociraptor extraction
modules:
    base.commands.Command cmd="for i in `find {sourcedir}/mnt -name PhysicalMemory.zdmp`; do {z2dmp} $$i `echo $$i|sed 's/zdmp/mem/'` &> /dev/null; done" run_before=True
    plugins.common.RVT_memory.Volatility outdir={outdir} volatility_plugins={volatility_plugins}
    base.commands.Command cmd="for i in `find {sourcedir}/mnt -name PhysicalMemory.zdmp`; do rm $$i; done" run_after=True
default_params: {
  'outdir':'${plugins.common.RVT_memory.Volatility:outdir}',
  'sourcedir': '${plugins.common:sourcedir}',
  'z2dmp': '${plugins.windows:z2dmp}',
  'volatility_plugins':'"windows.info windows.pslist.PsList windows.pstree.PsTree windows.dlllist.DllList windows.handles.Handles windows.netscan.NetScan windows.cmdline.CmdLine windows.sockets.Sockets windows.envars.Envars windows.getservicesids.GetServiceSIDs windows.malfind.Malfind windows.drivermodule.DriverModule windows.registry.userassist.UserAssist windows.registry.shimcache.ShimCache windows.registry.amcache.AmCache windows.registry.hivelist.HiveList"'}
params_help: {
  'outdir':'path to directory where generated files will be stored',
  'volatility_plugins':'Space separated list of volatility plugins to run'}
;path: ${sourcedir}/mnt/p*/PhysicalMemory.mem

