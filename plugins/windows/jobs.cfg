default_params: {
  'outfile': '${analysisdir}/source_summary.md',
  'tz': 'local'}
params_help: {
  'outfile': 'path to file where results will be stored',
  'tz': 'tzdata/Olsen timezone name to set for the dates. Examples: `Europe/Berlin`, `America/New_York`, `UTC`. If `local` is set, timezone will be searched on the registry'}


[csv_to_mdtable]
modules:
  base.output.MDTableSink outfile='{outfile}' backticks_fields={backticks_fields} fieldnames={out_fieldnames}\ Host
  base.mutations.RenameFields fields={rename_fields} new_fields={new_rename_fields}
  base.mutations.SortResults fields={sort_fields}
  base.directory.GlobFilter ftype='file'
  base.mutations.SpaceText fields={space_fields}
  base.mutations.SetFields presets='{{"Host":"{source}"}}'
  base.mutations.DateFields fields={date_fields} new_fields={new_date_fields} sep=' ' tz_name='{tz}' timespec='seconds' hide_tz='True'
  base.mutations.DateFields fields={date_fields} sep=' ' timespec='seconds' tz_name='UTC' hide_tz='False'
  base.input.CSVReader
default_params: {
  'date_fields': '',
  'sort_fields': '',
  'new_date_fields': '',
  'space_fields': '',
  'backticks_fields': '',
  'rename_fields': '',
  'new_rename_fields': '',
  'source': '${DEFAULT:source}'}

[copy_file]
modules:
  base.commands.Command cmd="if [ -e {outfile} ]; then rm {outfile}; fi && if [ -e {infile} ]; then cp {infile} {outfile}; fi"
default_params: {'outfile': '${analysisdir}/source_summary.md',
  'infile': '${analysisdir}/os_summary.md'}

[wait_for_job]
modules:
  base.utils.WaitForJob job_name={job_name}

;;;;;;;;;;;;;;;;;;;;;;;;; IR

[windows.IR_preforensics]
description: Main set of forensic analysis jobs to run on Windows artifacts. It assumes artifact files are located under `${mountdir}`

  Artifacts parsed:

    - MFT Timeline
    - Characterize: `${characterize:outfile}`
    - Registry: `${plugins.windows.RVT_autorip.Autorip:outdir}`
    - Event Logs:
        - `${plugins.windows:eventdir}`
        - `${plugins.windows:eventsanalysisdir}`
    - Lnk and Jumplists:
        - `${plugins.windows.RVT_lnk.LnkExtract:outdir}`
        - `${plugins.windows.RVT_lnk.LnkExtractAnalysis:outdir}`
    ; - UsnJrnl: `${plugins.windows.RVT_UsnJrnl.UsnJrnl:outdir}`
    - Prefetch: `${plugins.windows.RVT_exec.Prefetch:outdir}`
    - Browser History: `${plugins.common.RVT_history.History:outdir}`
    ; - Recycle Bin: `${plugins.windows.RVT_recycle.Recycle:outdir}`
    ; - RFC: `${plugins.windows.RVT_exec.RFC:outdir}`
    ; - Activities Cache: `${plugins.windows.RVT_activity_cache.ActivitiesCache:outdir}`
    ; - USB artifacts `${plugins.windows.RVT_usb.USBSetupAPI:outdir}`
    ; - SRUM: `${plugins.windows.RVT_srum.Srum:outdir}`
help_section: IR
jobs:
    allocfiles
    mft_timeline
    windows.registry_hives
    windows.characterize
    windows.recentfiles_default
    windows.events
    windows.eventartifacts
    windows.execution
    windows.scheduled_tasks_all
    browsers
    ; windows.source_summary
    events.recentfiles index_name='{index_name}'
    events.save path={events_dir}/{source}.*recentfiles.json
    events.prefetch index_name='{index_name}'
    events.save path={events_dir}/{source}.*prefetch.json
    events.ccm index_name='{index_name}'
    events.save path={events_dir}/{source}.*ccm.json
    events.browsers index_name='{index_name}'
    events.save path={events_dir}/{source}.*amcache.json
    events.userassist index_name='{index_name}'
    events.save path={events_dir}/{source}.*userassist.json
    events.shellbags index_name='{index_name}'
    events.save path={events_dir}/{source}.*shellbags.json
    events.appcompatcache index_name='{index_name}'
    events.save path={events_dir}/{source}.*appcompatcache.json
    events.save path={events_dir}/{source}.*history.json
    events.save path={events_dir}/{source}.*cookies.json
    ; events.save path={events_dir}/{source}.*downloads.json
    ; events.srum index_name='{index_name}'
    ; events.save path={events_dir}/{source}.*network*.json
    events.logs index_name='{index_name}'
    events.save path={events_dir}/{source}.*event_logs.json
    events.timeline index_name='{index_name}'
    events.save path={events_dir}/{source}.*fs_timeline.json
    ; events.usnjrnl index_name='{index_name}'
    ; events.save path={events_dir}/{source}.*usnjrnl.json
default_params: {'index_name':'${ecs:es_index_name}', 'events_dir':'${ecs:outdir}', 'source':'${source}'}
params_help: {'index_name': 'Name of the indice in ElasticSearch'}

