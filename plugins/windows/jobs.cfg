path:

[windows.edr_av]
description: Parse EDRs and AVs logs. 
  Results are stored under the directory `${plugins.windows:edravdir}`
help_section: windows
jobs:
  windows.edr_av.cortex
  windows.edr_av.eset
  windows.edr_av.mcafee
  windows.edr_av.windows_defender
  windows.mplogs
  windows.edr_av.bitdefender
  windows.edr_av.sophos
  windows.edr_av.panda
  windows.edr_av.summary

[windows.edr_av.summary]
description: Analizes files from output `${plugins.windows:edravdir}` .csv files.
jobs:
  base.directory.GlobClearEmptyFile target="${plugins.windows:edravdir}/*.csv"
  base.directory.GlobClear target="{outfile_1}" ftype="file"
  windows.edr_av.summary_edr_av outdir={outdir}
  csv_to_sorted_csv path={infile_1} outfile={outfile_1} fields='Time'
default_params: {
  'infile_1':'${plugins.windows:edravdir}/summary/edr_av_tmp.csv',
