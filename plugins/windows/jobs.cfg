    windows.events.UserProfile outfile="{outfile}"
    windows.events.Run outfile="{outfile}"
    windows.events.PartitionDiagnostic outfile="{outfile}"
    windows.events.KernelPnp outfile="{outfile}"
    windows.events.NtfsOperational outfile="{outfile}"
    windows.events.StorageClassPnp outfile="{outfile}"
    windows.events.DeviceSetupManagerAdmin outfile="{outfile}"
    windows.events.DeviceSetupManagerOperational outfile="{outfile}"
