[windows.wer]
description: Parse Windows WER reports
  Provide a globpath to folder `C:/ProgramData/Microsoft/Windows/WER/ReportArchive` or `C:/Users/*/AppData/Local/Microsoft/Windows/WER/ReportArchive` as path
help_section: windows
modules:
  base.output.CSVSink outfile={outfile_csv} file_exists=APPEND
