  'username': 'User name identifier'}

[windows.exec]
description: Extract and parse Windows artifacts related with applications execution (Prefetch, RFC).

  - Prefetch: files designed to speed up the execution of processes. Contain DLLs used, how many times the executable run (in <W10), timestamp
  - RFC: process creation data stored by ProgramDataUpdater.
help_section: windows
jobs:
    windows.prefetch_aux vss={vss} outdir={outdir} path="{mountdir}/p*/[Ww]indows/[Pp]refetch"
    windows.rfc_aux vss={vss} outdir={outdir} path="{mountdir}/p*/[Ww][Ii][Nn][Dd][Oo][Ww][Ss]/[Aa]pp[Cc]ompat/[Pp]rograms/RecentFileCache.bcf"
    windows.ccm_aux vss={vss} path="{mountdir}/p*/[Ww][Ii][Nn][Dd][Oo][Ww][Ss]/[Ss]ystem32/[Ww]bem/[Rr]epository"
default_params: {
  'vss':False,
  'outdir':'${plugins.windows.RVT_exec.Prefetch:outdir}',
  'mountdir':'${mountdir}'}
params_help: {
  'vss':'process Volume Shadow Snapshot',
  'outdir':'path to directory where generated files will be stored'}

[windows.prefetch_aux]
modules:
  base.directory.GlobFilter ftype='directory'
  plugins.windows.RVT_exec.Prefetch outdir={outdir}
default_params: {'outdir':'{outdir}'}

[windows.rfc_aux]
modules:
  base.directory.GlobFilter ftype='file'
  plugins.windows.RVT_exec.RFC outdir={outdir}
default_params: {'outdir':'{outdir}'}

[windows.ccm_aux]
modules:
  base.output.CSVSink outfile="{outfile2}" file_exists=OVERWRITE fieldnames="LastUsedTime FolderPath ExplorerFileName FileSize LastUserName LaunchCount OriginalFileName FileDescription CompanyName ProductName ProductVersion FileVersion"
  base.mutations.GetFields fields='["FolderPath", "ExplorerFileName", "FileSize", "LastUserName", "LastUsedTime", "LaunchCount", "OriginalFileName", "FileDescription", "CompanyName", "ProductName", "ProductVersion", "FileVersion"]'
  base.output.JSONSink outfile="{outfile}" file_exists=APPEND
  base.directory.GlobFilter ftype='directory'
  windows.RVT_exec.CCM
outfile: ${plugins.windows:execdir}/CCM.json
outfile2: ${plugins.windows:execdir}/CCM.csv
default_params: {'outfile':'${outfile}', 'outfile2':'${outfile2}'}

[windows.prefetch]
description: Extract and parse Windows artifacts related with applications execution (Prefetch)
help_section: windows
modules:
  plugins.windows.RVT_exec.Prefetch outdir={outdir} volume_id={volume_id}
default_params: {
  'outdir':'${plugins.windows.RVT_exec.Prefetch:outdir}',
  'volume_id': ''}
params_help: {'path':'path to directory containing pf files',
  'outdir':'path to directory where generated files will be stored',
  'volume_id': 'volume identifier, such as partition number. Ex: p03'}

[windows.rfc]
description: Extract and parse Windows artifacts related with applications execution (RFC)
help_section: windows
modules:
  plugins.windows.RVT_exec.RFC outdir={outdir}
default_params: {
