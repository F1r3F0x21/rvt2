  base.output.JSONSink outfile={outfile_json}
  base.mutations.DateFields fields='EventTime UploadTime'
  base.directory.GlobFilter ftype='directory'
  plugins.windows.RVT_wer.WerParser outdir='{outdir}'
default_params: {
  'outdir':'${plugins.windows.RVT_wer.WerParser:outdir}',
