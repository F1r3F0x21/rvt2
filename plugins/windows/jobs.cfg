  csv_to_mdtable outfile={outfile} path=${plugins.windows.RVT_hives.UserAssistAnalysis:outdir}/userassist.csv out_fieldnames="LastExecuted\ LastExecutedLocal\ User\ ProgramName" sort_fields="LastExecuted" backticks_fields="ProgramName" date_fields="LastExecuted" new_date_fields="LastExecutedLocal" tz='{tz}' first_line="## UserAssist\n\n[[[inlinetable(Programas ejecutados registrados en userassist,m{{2.1cm}}Hm{{4cm}}m{{4cm}}H)]]]"
