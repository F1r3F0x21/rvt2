  csv_to_mdtable outfile={outfile} path=${plugins.windows.RVT_hives.ShellbagsAnalysis:outdir}/shellbags.csv out_fieldnames="LastWriteTime\ LastWriteTimeLocal\ User\ AbsolutePath" sort_fields="LastWriteTime" space_fields="AbsolutePath" steps="32" backticks_fields="AbsolutePath" date_fields="LastWriteTime" new_date_fields="LastWriteTimeLocal" tz='{tz}' first_line="## Shellbags\n\n[[[inlinetable(Rutas visitadas registradas en Shellbags,m{{2.2cm}}Hm{{3cm}}m{{7.3cm}}H)]]]"
  csv_to_mdtable outfile={outfile} path=${plugins.windows.RVT_lnk.LnkExtractAnalysis:outdir}/recentfiles.csv out_fieldnames="LastOpen\ LastOpenLocal\ user\ FirstOpen\ FirstOpenLocal\ path\ network_path" sort_fields="last_open_date" rename_fields="last_open_date\ first_open_date" new_rename_fields="LastOpen\ FirstOpen" backticks_fields=path\ network_path space_fields="path\ network_path" steps="24 14" date_fields="last_open_date\ first_open_date" new_date_fields="LastOpenLocal\ FirstOpenLocal" tz='{tz}' first_line="## Recentfiles\n\n[[[inlinetable(Archivos abiertos registrados en lnk,m{{2cm}}Hm{{2.5cm}}HHm{{5.5cm}}m{{3cm}}H)]]]"
