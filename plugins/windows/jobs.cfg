;;;;;;;;;;;;;;;;;;;;;;;; TELEMETRY

[windows.telemetry]
description: Parses rbs files from Windows Telemetry.

    Examples:

    - Execution: `rvt2 --client 100100-test --casename Test --source image1 -j windows.telemetry`

help_section: windows

cascade:
    plugins.windows.RVT_telemetry.Telemetry
    base.output.JSONSink outfile="{outdir}/telemetry.json" file_exists=APPEND
    base.directory.GlobFilter ftype='file'
default_params: {
  'outdir':'${plugins.windows:windowsdir}/telemetry'}
params_help: {
  'path': 'path to rbs files',
  'outdir': 'path to directory where generated files will be stored'}
path: ${mountdir}/p*/ProgramData/Microsoft/Diagnosis*/*.rbs

[windows.telemetryartifacts]
description: Extract artifacts from parsed telemetry rbs files. It is required to execute `windows.telemetry` before this job
    Artifacts extraced:
     - Login, logoff
     - Poweron, poweroff
     - RDP connections
     - Wifi network artifacts
     - Shared objects
     - Winupdate events
     - Scheduled tasks
     - Installed processes and services
     - BITS
     - USB plugs
     - USB install drivers
     - Office Alerts
help_section: windows
jobs:
    windows.telemetryartifacts.app_execution path="{path}" outfile="{outdir}/AppExecution.csv"
    windows.telemetryartifacts.app_inventory path="{path}" outfile_csv="{outdir}/AppInventory.csv"
    windows.telemetryartifacts.app_crash_hang path="{path}" outfile_csv="{outdir}/app_crash_hang.csv"
    windows.telemetryartifacts.wer path="{path}" outfile_csv="{outdir}/wer.csv"
    windows.telemetryartifacts.user_defaults path="{path}" outfile_csv="{outdir}/user_defaults.csv"
    windows.telemetryartifacts.browser_history path="{path}" outfile_csv="{outdir}/BrowserHistory.csv"
    windows.telemetryartifacts.wifi_connected path="{path}" outfile_csv="{outdir}/Wifi_connected.csv"
    windows.telemetryartifacts.WLANScanResults path="{path}" outfile_csv="{outdir}/wlanscan.csv"
    windows.telemetryartifacts.SRUMAppActivity path="{path}" outfile_csv="{outdir}/SRUM_activity.csv"
    windows.telemetryartifacts.SRUMNetworkUsage path="{path}" outfile_csv="{outdir}/SRUM_network_usage.csv"
    windows.telemetryartifacts.PhysicalDrives path="{path}" outfile_csv="{outdir}/phisical_drives.csv"
    windows.telemetryartifacts.Drive_info path="{path}" outfile_csv="{outdir}/drive_info.csv"
    windows.telemetryartifacts.Volume_info path="{path}" outfile_csv="{outdir}/volume_info.csv"
    windows.telemetryartifacts.Pnp path="{path}" outfile_csv="{outdir}/pnp.csv"
    windows.telemetryartifacts.Devices path="{path}" outfile_csv="{outdir}/devices.csv"
    windows.telemetryartifacts.Drivers path="{path}" outfile_csv="{outdir}/drivers.csv"
    windows.telemetryartifacts.DriversPackage path="{path}" outfile_csv="{outdir}/drivers_package.csv"
    windows.telemetryartifacts.Bios_info path="{path}" outfile_csv="{outdir}/bios.csv"
    windows.telemetryartifacts.antivirus path="{path}" outfile_csv="{outdir}/AV.csv"
    windows.telemetryartifacts.Services path="{path}" outfile_csv="{outdir}/services_info.csv"
path: ${plugins.windows:windowsdir}/telemetry/telemetry.json
default_params: {'path':'${path}',
  'outdir':'${plugins.windows:analysisdir}/telemetry'}
params_help: {'path':'path to json file gnerated by windows.events job',
  'outdir':'directory where resulting files will be stored'}

