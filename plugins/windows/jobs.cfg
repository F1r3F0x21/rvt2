  'outdir': '${plugins.windows:edravdir}'
  }

[windows.edr_av.summary_edr_av]
modules:
  base.mutations.ForEach run_job=windows.edr_av.summary_edr_av_aux outdir={outdir}
  base.mutations.CommonFields filename_stem=True
  base.directory.GlobFilter ftype='file' recursive=False
  base.mutations.MirrorOptions include_section=True relative_path=False
path: ${plugins.windows:edravdir}/*.csv
 
[windows.edr_av.summary_edr_av_aux]
modules:
  base.output.CSVSink outfile='{outdir}/summary/edr_av_tmp.csv' fieldnames={out_fields} file_exists=APPEND quoting=0
  base.mutations.GetFields fields={out_fields}
  base.mutations.SetFields presets='{{"Artifact":"edr_av"}}'
  base.mutations.SetFields presets='{{"AV":"{filename_stem}"}}'
  base.directory.GlobFilter ftype='file'
  base.mutations.DateFields fields="Time" sep=' ' timespec='seconds' output_timezone='UTC' hide_tz='True'
  plugins.windows.RVT_edrlogs.Summary
  base.input.CSVReader
default_params: {
  'outdir': '${plugins.windows:edravdir}',
  'out_fields': '"Time EventID Message Object Hash User Process ProcessId Level ErrorMessage Threat OldValue NewValue Action Severity Status SID ScanDetails ScanSummary LogFilename AV Artifact"',
  'input_delimiter': ';'}

